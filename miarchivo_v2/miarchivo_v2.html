<!DOCTYPE html>
<html>
<head>
    <title>Clase antes de vacaciones</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="https://unpkg.com/@blaze/css@x.x.x/dist/blaze/blaze.css">
</head>
<body >
    <div id="encabezado"></div>

    <div id="contenedor">
    <div class="elemento"> Sección 1</div>
    <div class="elemento"> Sección 2</div>
    <div class="elemento"> Sección 3</div>      
   </div> 
    <div id="Texti"></div>
   <button class="c-button" id = "titulo">Click</button>
  
   <div id="MiArtista"></div>
   <button class="c-button" id="botonArtista">Mostrar Mí Artista</button>

   <div id="OtroArtista"></div>
   <button class="c-button" id="botonOtroArtista">Mostrar Otro Artista</button>

  <style >
    
   

  </style>
   
   

  

  
<script >
      let t=1986;
      const c=3.28;
      console.log("lols")
      let p={"titulo":"Llano en llamas","autor":"Juan Rulfo"}
      let d=document.createElement("p")
    
      d.textContent="Hola"
      document.getElementById("encabezado").appendChild(d);
      d.setAttribute("style","color:yellow")
      d.setAttribute("border","14px black")

    async function obtenerJSON() {
        const respuesta = await fetch('archivo.json');
        const datos = await respuesta.json();
        console.log(datos);
      
        let a = document.createElement("p");
        a.textContent=datos.autor;
        a.setAttribute("style", "color: yellow");
        document.getElementById("Texti").appendChild(a);

      }

      async function obternerJSON() {
        const respuesta = await fetch('https://openlibrary.org/subjects/love.json?published_in=1500-1600');
        const datos = await respuesta.json();
        console.log(datos);
        let a=document.createElement("p")
        a.textContent= datos.works[0].title;
        document.getElementById("Texti").appendChild(a);
      }
      async function obternerJSON2() {
        const respuesta = await fetch('https://openlibrary.org/subjects/love.json?published_in=1500-1600');
        const datos = await respuesta.json();
        console.log(datos);
        let a=document.createElement("p")
        a.textContent= datos.works[1].title;
        document.getElementById("Texti").appendChild(a);
      }

      async function obternerJSON3() {
        const respuesta = await fetch('https://www.theaudiodb.com/api/v1/json/123/search.php?s=Luis+Miguel');
        const datos = await respuesta.json();
        console.log(datos);

        let a = document.createElement("p");
        a.textContent=datos.artists[0].strBiographyES;
        a.setAttribute("style", "color: red");
        document.getElementById("MiArtista").appendChild(a);

        let imglink = datos.artists[0].strArtistThumb;
        let i = document.createElement("img");
        i.setAttribute("src", imglink);
        
        document.getElementById("MiArtista").appendChild(i);
      }

      async function obternerJSON4() {
        const respuesta = await fetch('https://www.theaudiodb.com/api/v1/json/123/search.php?s=Maneskin');
        const datos = await respuesta.json();
        console.log(datos);

        let a = document.createElement("p");
        a.textContent=datos.artists[0].strBiography;
        a.setAttribute("style", "color: red");
        document.getElementById("OtroArtista").appendChild(a);

        let imglink = datos.artists[0].strArtistThumb;
        let i = document.createElement("img");
        i.setAttribute("src", imglink);
        
        document.getElementById("OtroArtista").appendChild(i);
      }

      obtenerJSON();
      obternerJSON();

    let b = document.getElementById("titulo");
    b.addEventListener("click", obternerJSON2);

    let f = document.getElementById("botonArtista");
    f.addEventListener("click", obternerJSON3);

    let g = document.getElementById("botonOtroArtista");
    g.addEventListener("click", obternerJSON4);

</script>



</body>
</html>
